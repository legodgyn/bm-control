<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status - Controle de BMs</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand-box">
          <div class="brand-icon">BM</div>
          <div>
            <div class="brand-title">Controle de BM's</div>
            <div class="brand-subtitle">Movy Digital</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-menu">
        <a class="menu-item" href="/dashboard.html">Dashboard</a>
        <a class="menu-item" href="/perfis.html">Perfis</a>
        <a class="menu-item active" href="/status.html">Status</a>
        <a class="menu-item" href="/relatorios.html">Relatórios</a>
      </nav>

<div class="sidebar-footer">
  <a href="https://bm.plpainel.com/dashboard.html" class="logout-btn">
    📊 Voltar ao Painel
  </a>
</div>
    </aside>

    <main class="content">
      <header class="hero-bar">
        <div>
          <h1>Status das BM's</h1>
        </div>
      </header>

      <section class="stats-grid">
        <div class="stat-card stat-top-analise status-click-card" onclick="setStatusAtivo('Em análise')">
          <span class="stat-label">🔎 Em análise</span>
          <strong id="countAnalise">0</strong>
        </div>

        <div class="stat-card stat-top-250 status-click-card" onclick="setStatusAtivo('250 disparos')">
          <span class="stat-label">🚀 250 disparos</span>
          <strong id="count250">0</strong>
        </div>

        <div class="stat-card stat-top-2000 status-click-card" onclick="setStatusAtivo('2.000 disparos')">
          <span class="stat-label">⚡ 2.000 disparos</span>
          <strong id="count2000">0</strong>
        </div>

        <div class="stat-card stat-top-10000 status-click-card" onclick="setStatusAtivo('10.000 disparos')">
          <span class="stat-label">🔥 10.000 disparos</span>
          <strong id="count10000">0</strong>
        </div>

        <div class="stat-card stat-top-100000 status-click-card" onclick="setStatusAtivo('100.000 disparos')">
          <span class="stat-label">👑 100.000 disparos</span>
          <strong id="count100000">0</strong>
        </div>
      </section>

      <section class="panel-box">
        <div class="panel-title-row">
          <h2>Filtro rápido</h2>
          <span id="contadorStatus" class="count-chip">0 registros</span>
        </div>

        <div class="status-filter-row">
          <button class="status-filter-btn active" data-status-btn="todos" onclick="setStatusAtivo('')">Todos</button>
          <button class="status-filter-btn" data-status-btn="Em análise" onclick="setStatusAtivo('Em análise')">Em análise</button>
          <button class="status-filter-btn" data-status-btn="250 disparos" onclick="setStatusAtivo('250 disparos')">250</button>
          <button class="status-filter-btn" data-status-btn="2.000 disparos" onclick="setStatusAtivo('2.000 disparos')">2.000</button>
          <button class="status-filter-btn" data-status-btn="10.000 disparos" onclick="setStatusAtivo('10.000 disparos')">10.000</button>
          <button class="status-filter-btn" data-status-btn="100.000 disparos" onclick="setStatusAtivo('100.000 disparos')">100.000</button>
        </div>
      </section>

      <section class="panel-box">
        <div class="panel-title-row">
          <h2>Registros por status</h2>
        </div>

        <div id="statusCards" class="cards-grid"></div>
      </section>
    </main>
  </div>

  <script src="/status.js"></script>
</body>
</html>
