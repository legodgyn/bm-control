<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Controle de BMs</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand-box">
          <div class="brand-icon">BM</div>
          <div>
            <div class="brand-title">Controle de BM's</div>
            <div class="brand-subtitle">Movy Digital</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-menu">
        <a class="menu-item active" href="/dashboard.html">Dashboard</a>
        <a class="menu-item" href="/perfis.html">Perfis</a>
        <a class="menu-item" href="/status.html">Status</a>
        <a class="menu-item" href="/relatorios.html">Relatórios</a>
      </nav>

      <div class="sidebar-footer">
  <a href="https://plpainel.com/dashboard" class="logout-btn">
    📊 Voltar ao Painel
  </a>
</div>
    </aside>

    <main class="content">
      <header class="hero-bar">
        <div>
          <h1>Gerênciamento de BM's</h1>
        </div>
      </header>

      <section class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">📊 Total de BMs</span>
          <strong id="statTotal">0</strong>
        </div>

        <div class="stat-card stat-top-analise highlight-blue">
          <span class="stat-label">🔎 Em análise</span>
          <strong id="statAnalise">0</strong>
        </div>

        <div class="stat-card stat-top-250 highlight-blue">
          <span class="stat-label">🚀 250 disparos</span>
          <strong id="stat250">0</strong>
        </div>

        <div class="stat-card stat-top-2000 highlight-green">
          <span class="stat-label">⚡ 2.000 disparos</span>
          <strong id="stat2000">0</strong>
        </div>

        <div class="stat-card stat-top-10000">
          <span class="stat-label">🔥 10.000 disparos</span>
          <strong id="stat10000">0</strong>
        </div>

        <div class="stat-card stat-top-100000">
          <span class="stat-label">👑 100.000 disparos</span>
          <strong id="stat100000">0</strong>
        </div>
      </section>

      <section class="panel-box">
        <div class="panel-title-row">
          <h2>Filtros</h2>
          <span id="contadorLista" class="count-chip">0 registros</span>
        </div>

        <div class="form-grid">
          <input
            type="text"
            id="buscaNome"
            placeholder="Buscar pelo nome da BM"
            oninput="digitarBusca()"
          />

          <select id="filtroPerfil" onchange="atualizarTela()">
            <option value="">Todos os perfis</option>
          </select>

          <button class="secondary-btn" type="button" onclick="limparFiltros()">
            Limpar filtros
          </button>
        </div>
      </section>

      <section class="panel-box">
        <div class="panel-title-row">
          <h2>Registros</h2>
        </div>

        <div id="bmCards" class="cards-grid"></div>
      </section>
    </main>
  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
